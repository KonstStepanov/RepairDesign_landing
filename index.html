    <title>IC "Repair Design Project"</title>

  <body class="body">
    <header>
      <nav class="navbar">
        <div class="wrapper navbar-content">
          <div class="navbar__container">
            <p class="navbar__logo highlighting">IC "REPAIR DESIGN PROJECT"</p>
            <ul class="navbar__list">
              <a href="#" class="navbar__list_item">HOME</a>
              <a href="#" class="navbar__list_item">PROJECTS</a>
              <a href="#" class="navbar__list_item">MEASURMENT</a>

    <main>
      <section class="hero">
        <section class="application">
          <div class="background">
            <div class="wrapper">

                    TURKEY REPAIR IN THE CITY OF
                  </h1>

                    Get ready-made turnkey repairs on time with work time saving
                    up to 45 days and 20% from cost of materials due to the
                    organization of work
                  </p>
                  <button class="button button__shadow">
                    CALCULATE THE COST
                  </button>
                  <button class="button button__transparent">
                    SUBMIT YOUR APPLICATION
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="completed">
          <div class="wrapper">
            <div class="completed-container">
              <div class="completed-container__item">
                <div class="completed-container__item_text">
                  <h1 class="completed-container__item_text_title"></h1>
                </div>
              </div>
            </div>
          </div>
        </section>
